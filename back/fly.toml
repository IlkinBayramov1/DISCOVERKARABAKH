# fly.toml app configuration file generated for discoverkarabakh-test on 2026-05-17T20:34:53+04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'discoverkarabakh-test'
primary_region = 'fra'

[build]

[deploy]
  release_command = 'npx prisma migrate deploy'

[http_service]
  internal_port = 4004
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'

[mounts]
  source = "upload_data"
  destination = "/data"