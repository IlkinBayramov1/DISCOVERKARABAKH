openapi: 3.0.0
info:
  title: Hotel Fraud Module API
  version: 1.0.0
  description: API for managing the fraud detection system and blacklists.

paths:
  /hotels/fraud/blacklist:
    get:
      summary: Get all blacklisted entries
      tags: [Fraud]
      responses:
        '200':
          description: List of blacklisted entries
          content:
            application/json:
              schema:
                type: array
                items: { $ref: './schemas.yaml#/components/schemas/Blacklist' }
    post:
      summary: Add a value to the blacklist
      tags: [Fraud]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: './schemas.yaml#/components/schemas/BlacklistCreate' }
      responses:
        '200':
          description: Entry added successfully

  /hotels/fraud/blacklist/risk-logs:
    get:
      summary: Get history of fraud risk evaluations
      tags: [Fraud]
      description: |
        Returns the 100 most recent risk assessments performed by the system.
        Risk levels are based on:
        * **Cancellation Velocity**: Frequent cancellations in the last 24h.
        * **Inventory Hoarding**: Requesting more than 5 rooms or multiple overlapping stays.
        * **New User High Value**: Expensive bookings from accounts created in the last 7 days.
        * **Last-Minute Large Booking**: Booking multiple rooms for the current day.
        * **Blacklist Match**: Match found in the global blacklist.
      responses:
        '200':
          description: List of risk evaluation logs
          content:
            application/json:
              schema:
                type: array
                items: { $ref: './schemas.yaml#/components/schemas/FraudRiskLog' }

  /hotels/fraud/blacklist/{id}:
    delete:
      summary: Remove an entry from the blacklist
      tags: [Fraud]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Entry removed successfully
