paths:
  /admins/fraud/blacklist:
    get:
      tags:
        - Admin Fraud
      summary: "Qara siyahını gətirir"
      description: "Bloklanmış bütün e-poçt, IP ünvanı və telefon nömrələrinin siyahısını qaytarır."
      security:
        - AdminAuth: []
      responses:
        '200':
          description: "Uğurlu cavab"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: 'schemas.yaml#/components/schemas/BlacklistEntry'
        '401':
          $ref: 'schemas.yaml#/components/responses/UnauthorizedError'

    post:
      tags:
        - Admin Fraud
      summary: "Qara siyahıya yeni qeyd əlavə edir"
      description: "Şübhəli fəaliyyət göstərən istifadəçini və ya IP ünvanını bloklamaq üçün istifadə olunur."
      security:
        - AdminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, value]
              properties:
                type:
                  type: string
                  enum: [email, ip, phone]
                value:
                  type: string
                reason:
                  type: string
      responses:
        '201':
          description: "Əlavə edildi"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: 'schemas.yaml#/components/schemas/BlacklistEntry'

  /admins/fraud/blacklist/{id}:
    delete:
      tags:
        - Admin Fraud
      summary: "Qara siyahıdan silir"
      description: "Səhvən və ya müvəqqəti bloklanmış qeydin silinməsi."
      security:
        - AdminAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          $ref: 'schemas.yaml#/components/schemas/GenericResponse'
        '404':
          $ref: 'schemas.yaml#/components/responses/NotFoundError'

  /admins/fraud/risk-logs:
    get:
      tags:
        - Admin Fraud
      summary: "Sistemin risk loqlarını monitorinq edir"
      description: "Süni intellekt və ya sistem qaydaları tərəfindən aşkar edilmiş şübhəli fəaliyyətlərin siyahısı."
      security:
        - AdminAuth: []
      responses:
        '200':
          description: "Risk loqları"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: 'schemas.yaml#/components/schemas/RiskLog'
