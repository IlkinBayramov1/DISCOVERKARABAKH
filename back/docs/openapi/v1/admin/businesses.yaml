paths:
  /admins/businesses:
    get:
      tags:
        - Admin Businesses
      summary: "Bütün biznesləri (otel, restoran, tur) siyahılayır"
      description: "Admin panelində bütün mülkləri tip və statusa görə süzgəcdən keçirərək görmək üçün istifadə olunur."
      security:
        - AdminAuth: []
      parameters:
        - name: type
          in: query
          required: false
          schema:
            $ref: 'schemas.yaml#/components/schemas/BusinessType'
        - name: status
          in: query
          required: false
          schema:
            $ref: 'schemas.yaml#/components/schemas/BusinessStatus'
      responses:
        '200':
          description: "Uğurlu cavab"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  count:
                    type: integer
                  data:
                    oneOf:
                      - type: array
                        items:
                          $ref: 'schemas.yaml#/components/schemas/AdminBusiness'
                      - $ref: 'schemas.yaml#/components/schemas/PendingBusinesses'
        '401':
          $ref: 'schemas.yaml#/components/responses/UnauthorizedError'

  /admins/businesses/pending:
    get:
      tags:
        - Admin Businesses
      summary: "Təsdiq gözləyən bütün biznesləri gətirir"
      description: "Yeni qeydiyyatdan keçmiş və admin tərəfindən hələ təsdiqlənməmiş bütün biznesləri qaytarır."
      security:
        - AdminAuth: []
      responses:
        '200':
          description: "Gözləmədə olan bizneslər"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: 'schemas.yaml#/components/schemas/PendingBusinesses'

  /admins/businesses/{type}/{id}/approve:
    patch:
      tags:
        - Admin Businesses
      summary: "Biznesi təsdiqləyir"
      description: "Gözləmədə olan biznesin statusunu 'active' olaraq dəyişdirir."
      security:
        - AdminAuth: []
      parameters:
        - name: type
          in: path
          required: true
          schema:
            $ref: 'schemas.yaml#/components/schemas/BusinessType'
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: "Biznes təsdiq edildi"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: 'schemas.yaml#/components/schemas/AdminBusiness'
        '404':
          $ref: 'schemas.yaml#/components/responses/NotFoundError'

  /admins/businesses/{type}/{id}/reject:
    patch:
      tags:
        - Admin Businesses
      summary: "Biznesi rədd edir"
      description: "Gözləmədə olan və ya mövcud biznesin statusunu 'rejected' olaraq dəyişdirir."
      security:
        - AdminAuth: []
      parameters:
        - name: type
          in: path
          required: true
          schema:
            $ref: 'schemas.yaml#/components/schemas/BusinessType'
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: "Biznes rədd edildi"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: 'schemas.yaml#/components/schemas/AdminBusiness'
        '404':
          $ref: 'schemas.yaml#/components/responses/NotFoundError'
