paths:
  /admins/hotels/{hotelId}/pricing-rules:
    get:
      tags:
        - Admin Revenue
      summary: "Otelin qiymət qaydalarını gətirir"
      description: "Konkret bir otel üçün təyin olunmuş bütün qiymət artımı və ya endirim qaydalarını prioritet sırası ilə qaytarır."
      security:
        - AdminAuth: []
      parameters:
        - name: hotelId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: "Qiymət qaydaları"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: 'schemas.yaml#/components/schemas/PricingRule'
        '401':
          $ref: 'schemas.yaml#/components/responses/UnauthorizedError'

    post:
      tags:
        - Admin Revenue
      summary: "Yeni qiymət qaydası yaradır"
      description: "Otel üçün xüsusi tarixlərdə və ya ümumi tətbiq olunacaq yeni qiymət tənzimləməsi əlavə edir."
      security:
        - AdminAuth: []
      parameters:
        - name: hotelId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, type, valueType, value, priority]
              properties:
                name:
                  type: string
                description:
                  type: string
                type:
                  type: string
                  enum: [increase, decrease]
                valueType:
                  type: string
                  enum: [percentage, fixed]
                value:
                  type: number
                priority:
                  type: integer
                startDate:
                  type: string
                  format: date-time
                endDate:
                  type: string
                  format: date-time
      responses:
        '201':
          description: "Qayda yaradıldı"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: 'schemas.yaml#/components/schemas/PricingRule'

  /admins/hotels/{hotelId}/pricing-rules/{ruleId}:
    delete:
      tags:
        - Admin Revenue
      summary: "Qiymət qaydasını silir"
      security:
        - AdminAuth: []
      parameters:
        - name: hotelId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: ruleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          $ref: 'schemas.yaml#/components/schemas/GenericResponse'
        '404':
          $ref: 'schemas.yaml#/components/responses/NotFoundError'
        '401':
          $ref: 'schemas.yaml#/components/responses/UnauthorizedError'
