paths:
  /admins/promotions:
    get:
      tags:
        - Admin Promotions
      summary: "Bütün aktiv promosiyaları siyahılayır"
      description: "Platforma üzrə həm ümumi, həm də otel bazlı endirim kodlarını və kampaniyaları görmək üçün istifadə olunur."
      security:
        - AdminAuth: []
      responses:
        '200':
          description: "Uğurlu cavab"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  count:
                    type: integer
                  data:
                    type: array
                    items:
                      $ref: 'schemas.yaml#/components/schemas/AdminPromotion'
        '401':
          $ref: 'schemas.yaml#/components/responses/UnauthorizedError'

    post:
      tags:
        - Admin Promotions
      summary: "Yeni promosiya/kupon yaradır"
      description: "Platforma səviyyəsində və ya konkret otel üçün yeni endirim kampaniyası təyin edir."
      security:
        - AdminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, discountType, discountValue, startDate, endDate]
              properties:
                title:
                  type: string
                description:
                  type: string
                discountType:
                  type: string
                  enum: [percentage, fixed]
                discountValue:
                  type: number
                startDate:
                  type: string
                  format: date-time
                endDate:
                  type: string
                  format: date-time
                hotelId:
                  type: string
                  format: uuid
                  description: "Otelə özəl endirimdirsə ID qeyd olunmalıdır"
      responses:
        '201':
          description: "Yaradıldı"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: 'schemas.yaml#/components/schemas/AdminPromotion'

  /admins/promotions/{id}:
    delete:
      tags:
        - Admin Promotions
      summary: "Promosiyanı silir"
      description: "Artıq qüvvədə olmayan və ya yanlış yaradılmış kampaniyanı ləğv edir."
      security:
        - AdminAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          $ref: 'schemas.yaml#/components/schemas/GenericResponse'
        '404':
          $ref: 'schemas.yaml#/components/responses/NotFoundError'
